name: ExamShield CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:        # Manual trigger — useful for recruiter demos

env:
  AWS_REGION:    us-east-2
  ECR_REPO:      examshield
  IMAGE_TAG:     ${{ github.sha }}

jobs:
  # ── Job 1: Run Tests ────────────────────────────────────────────────────────
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       examshield_test
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirement.txt   # no 's'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirement.txt pytest pytest-cov

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/examshield_test
          SECRET_KEY:   test-secret-key-not-for-prod
          FLASK_ENV:    testing
        run: pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true   # Don't fail the pipeline on coverage upload issues

  # ── Job 2: Build → Push ECR → Deploy to EC2 ─────────────────────────────────
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test             # Only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: build-image
        
        
        
      - name: Debug SSH secret
        run: |
          echo "Length: ${#KEY}"
          echo "$KEY" | head -1
        env:
          KEY: ${{ secrets.EC2_SSH_KEY }}  
      

            - name: Validate EC2_SSH_KEY
        shell: bash
        env:
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "Length: ${#KEY}"

          if [ -z "$KEY" ]; then
            echo "ERROR: Secret is empty"
            exit 1
          fi

          printf "%s" "$KEY" > key.pem

          echo "First line:"
          head -1 key.pem

          echo "Last line:"
          tail -1 key.pem

          chmod 600 key.pem

          ssh-keygen -y -f key.pem >/dev/null

          echo "✅ Private key is valid"
