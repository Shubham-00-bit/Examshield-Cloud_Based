name: ExamShield CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:        # Manual trigger — useful for recruiter demos

env:
  AWS_REGION:    us-east-2
  ECR_REPO:      examshield
  IMAGE_TAG:     ${{ github.sha }}

jobs:
  # ── Job 1: Run Tests ────────────────────────────────────────────────────────
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       examshield_test
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirement.txt   # no 's'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirement.txt pytest pytest-cov

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/examshield_test
          SECRET_KEY:   test-secret-key-not-for-prod
          FLASK_ENV:    testing
        run: pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
        continue-on-error: true   # Don't fail the pipeline on coverage upload issues

  # ── Job 2: Build → Push ECR → Deploy to EC2 ─────────────────────────────────
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test             # Only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: build-image
        
        
        
      - name: Debug SSH secret
        run: |
          echo "Length: ${#KEY}"
          echo "$KEY" | head -1
        env:
          KEY: ${{ secrets.EC2_SSH_KEY }}  
      

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ubuntu
          key:         ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image
            aws ecr get-login-password --region us-east-2 \
              | docker login --username AWS --password-stdin \
                ${{ steps.login-ecr.outputs.registry }}

            # Update image tag in env
            cd /home/ubuntu/Examshield-Cloud_Based
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env
            echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> .env
            echo "ECR_REPO=${{ env.ECR_REPO }}" >> .env

            # Zero-downtime rolling deploy
            docker compose pull backend
            docker compose up -d --no-deps backend
            docker compose up -d --no-deps nginx

            # Health check — wait up to 30s
            for i in $(seq 1 6); do
              if curl -sf http://localhost/health; then
                echo "✅ Deploy successful"
                break
              fi
              echo "⏳ Waiting for health check... ($i/6)"
              sleep 5
            done

            # Clean up old images to save disk space on t2/t3.micro
            docker image prune -f
