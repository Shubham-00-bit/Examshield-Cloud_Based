events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate limiting (prevents exam brute-force)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    upstream flask_backend {
        server backend:5000;
    }

    server {
        listen 80;
        server_name _;

        # Health check endpoint (for ALB/ELB target group)
        location /health {
            proxy_pass http://flask_backend/health;
            access_log off;
        }

        # API routes → Flask
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://flask_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Auth + exam routes → Flask
        location ~ ^/(login|register|exam|admin|blockchain|upload|candidate|university) {
            proxy_pass         http://flask_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Static frontend files
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Frontend HTML pages
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /landing/index.html;
        }
    }
}
